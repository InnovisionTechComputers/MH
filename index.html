    let current = 0, score = 0, userName = "";

    function initApp() {
        userName = document.getElementById('user-name').value;
        if(!userName) { alert("नाव टाका!"); return; }
        document.getElementById('start-screen').style.display = 'none';
        document.getElementById('quiz-screen').style.display = 'block';
        loadNext();
    }

    function loadNext() {
        if(current >= questions.length) { finish(); return; }
        
        const qData = questions[current];
        document.getElementById('q-text').innerText = qData.q;
        
        // प्रश्न आणि पर्याय वाचणे
        speakQuestion();

        const box = document.getElementById('options-box');
        box.innerHTML = "";
        qData.o.forEach(opt => {
            const b = document.createElement('button');
            b.className = 'option-btn';
            b.innerText = opt;
            b.onclick = () => checkAns(opt);
            box.appendChild(b);
        });
    }

   // --- मराठी आवाज फिक्स करण्यासाठी नवीन लॉजिक ---
let marathiVoice = null;

function loadVoices() {
    let voices = window.speechSynthesis.getVoices();
    
    // १. नेमका मराठी (mr-IN) आवाज शोधणे
    marathiVoice = voices.find(v => v.lang === 'mr-IN' || v.lang === 'mr_IN');

    // २. जर वरील सापडला नाही, तर नावात 'Marathi' असलेले शोधणे
    if (!marathiVoice) {
        marathiVoice = voices.find(v => v.name.toLowerCase().includes('marathi'));
    }

    // ३. जर तरीही नसेल, तर हिंदी (hi-IN) वापरणे जे मराठीला जवळचे आहे
    if (!marathiVoice) {
        marathiVoice = voices.find(v => v.lang === 'hi-IN');
    }
}

// आवाज लोड होण्यासाठी हा इव्हेंट महत्त्वाचा आहे
window.speechSynthesis.onvoiceschanged = loadVoices;
loadVoices();

function speakQuestion() {
    window.speechSynthesis.cancel(); // जुने बोलणे थांबवा
    
    const qData = questions[current];
    const textToSpeak = `${qData.q}. पर्याय आहेत. १. ${qData.o[0]}. २. ${qData.o[1]}. ३. ${qData.o[2]}.`;
    
    const msg = new SpeechSynthesisUtterance(textToSpeak);
    
    // आवाज सेट करणे
    if (marathiVoice) {
        msg.voice = marathiVoice;
    }
    
    msg.lang = 'mr-IN'; // लँग्वेज कोड सक्तीने मराठी ठेवणे
    msg.rate = 0.8;      // लहान मुलांसाठी सावकाश बोलणे
    msg.pitch = 1;       // नैसर्गिक आवाज
    
    window.speechSynthesis.speak(msg);
}
// ------------------------------------------

    function checkAns(sel) {
        window.speechSynthesis.cancel(); // उत्तर दिल्यावर बोलणे थांबवा
        if(sel === questions[current].a) {
            score += 10;
            document.getElementById('current-score').innerText = score;
            document.getElementById('snd-correct').play();
            confetti({ particleCount: 40, spread: 50 });
        } else {
            document.getElementById('snd-wrong').play();
        }
        current++;
        setTimeout(loadNext, 1200);
    }

    function finish() {
        database.ref('scores/' + Date.now()).set({ name: userName, total: score });
        document.getElementById('quiz-screen').innerHTML = `
            <h2 style="color:var(--success)">अभिनंदन, ${userName}! 🎉</h2>
            <p style="font-size:1.5rem">तुमचा स्कोअर: ${score}</p>
            <button class="btn" onclick="location.reload()">परत जा</button>
        `;
        confetti({ particleCount: 200, spread: 100 });
    }
</script>
</body>
</html>
